spring:
  r2dbc:
    url: ${DEV_DB_URL}
    username: ${DEV_DB_USERNAME}
    password: ${DEV_DB_PASSWORD}

  sql:
    init:
      mode: always

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    publisher-confirm-type: correlated
    publisher-returns: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      database: 0

    cache:
      type: redis
      redis:
        time-to-live: 600000 # 10 minutes in ms
        cache-null-values: false
