spring:
  r2dbc:
    pool:
      initial-size: 1
      max-size: 3
      max-idle-time: 30s
    url: ${PROD_DB_URL}
    username: ${PROD_DB_USERNAME}
    password: ${PROD_DB_PASSWORD}

  sql:
    init:
      mode: always

  rabbitmq:
    addresses: ${CLOUDAMQP_URL}
    publisher-confirm-type: correlated
    publisher-returns: true