name: Order UI Deploy

on:
  pull_request:
    paths:
      - 'order-ui/**'

  push:
    branches:
      - main
    paths:
      - 'order-ui/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: order-ui

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: order-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    env:
      RENDER_UI_DEPLOY_HOOK_URL: ${{ secrets.RENDER_UI_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger Render deploy
        if: env.RENDER_UI_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "$RENDER_UI_DEPLOY_HOOK_URL"