name: Notification Service Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'notification-service/**'
  pull_request:
    paths:
      - 'notification-service/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notification-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build
        run: mvn -B clean package -DskipTests

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    env:
      RENDER_NOTIFICATION_DEPLOY_HOOK_URL: ${{ secrets.RENDER_NOTIFICATION_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger Render deploy
        if: env.RENDER_NOTIFICATION_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "$RENDER_NOTIFICATION_DEPLOY_HOOK_URL"