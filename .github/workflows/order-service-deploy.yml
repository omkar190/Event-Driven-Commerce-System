name: Order Service Deploy

on:
  pull_request:
    paths:
      - 'order-service/**'

  push:
    branches:
      - main
    paths:
      - 'order-service/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: order-service

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: order_service_db
          POSTGRES_USER: order_service_user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U order_service_user -d order_service_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3.13
        ports:
          - 5672:5672

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379

    env:
      DEV_DB_URL: r2dbc:postgresql://localhost:5432/order_service_db?schema=order_schema
      DEV_DB_USERNAME: order_service_user
      DEV_DB_PASSWORD: password
      SPRING_PROFILES_ACTIVE: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        run: mvn -B test

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger Render deploy
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
